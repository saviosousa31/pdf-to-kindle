name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-project

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar licencas Android
        run: yes | sdkmanager --licenses || true

      - name: Instalar SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Verificar e criar Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ] || [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Gradle wrapper não encontrado, gerando..."
            gradle wrapper --gradle-version 8.6 --distribution-type bin
          else
            echo "Gradle wrapper já existe"
          fi
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android-project/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android-project/**/gradle-wrapper.properties', 'android-project/**/*.gradle*', 'android-project/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-para-EPUB-Android
          path: android-project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
