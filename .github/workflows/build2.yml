name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-project

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # O setup-java v4 já lida com o cache do Gradle automaticamente
          cache: 'gradle'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar licencas Android
        run: yes | sdkmanager --licenses || true

      # O passo de instalar SDK components manualmente pode ser removido 
      # pois o Gradle baixa as versões necessárias definidas no build.gradle

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        # Adicionando limites de memória via GRADLE_OPTS
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: PDF-para-EPUB-Android
          path: android-project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
